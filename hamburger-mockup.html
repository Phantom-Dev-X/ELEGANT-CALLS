<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Mockup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0A0A0A; color: white; font-family: 'Inter', sans-serif; min-height: 100vh; }

        .gold-gradient-text {
            background: linear-gradient(135deg, #C9A84C 0%, #E8D48B 50%, #C9A84C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* NAVBAR */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201,168,76,0.2);
            padding: 0 20px;
            height: 60px;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* Hide the checkbox */
        #hamburger-toggle { display: none; }

        /* Hamburger icon */
        .hamburger {
            display: flex; flex-direction: column; justify-content: space-between;
            width: 24px; height: 15px; cursor: pointer; z-index: 60;
        }
        .hamburger span {
            display: block; width: 100%; height: 2px; border-radius: 2px;
            background: #C9A84C; transition: all 0.3s ease;
        }

        /* When checked: X animation */
        #hamburger-toggle:checked ~ nav .hamburger span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        #hamburger-toggle:checked ~ nav .hamburger span:nth-child(2) {
            opacity: 0;
        }
        #hamburger-toggle:checked ~ nav .hamburger span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* DROPDOWN MENU */
        .mobile-menu {
            position: fixed; top: 60px; left: 0; right: 0;
            background: rgba(10,10,10,0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201,168,76,0.2);
            padding: 24px 20px;
            transform: translateY(-100%);
            opacity: 0;
            transition: transform 0.4s ease, opacity 0.3s ease;
            z-index: 40;
        }

        /* Show dropdown when checkbox is checked */
        #hamburger-toggle:checked ~ .mobile-menu {
            transform: translateY(0);
            opacity: 1;
        }

        /* Menu links */
        .mobile-menu a {
            display: block;
            color: #B8B8B8;
            text-decoration: none;
            font-size: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
            padding: 14px 0;
            border-bottom: 1px solid #2A2A2A;
            transition: color 0.3s, padding-left 0.3s;
        }
        .mobile-menu a:last-child { border-bottom: none; }
        .mobile-menu a:hover { color: #C9A84C; padding-left: 10px; }

        /* Active link */
        .mobile-menu a.active {
            color: #C9A84C;
        }

        /* Overlay behind menu */
        .menu-overlay {
            position: fixed; top: 60px; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 35;
        }
        #hamburger-toggle:checked ~ .menu-overlay {
            opacity: 1; pointer-events: auto;
        }

        /* Book Now button in nav */
        .nav-btn {
            background: linear-gradient(135deg, #C9A84C 0%, #E8D48B 50%, #C9A84C 100%);
            color: #0A0A0A; font-size: 11px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer;
        }

        /* Label text for mockup */
        .mockup-label {
            position: fixed; bottom: 20px; left: 0; right: 0;
            text-align: center; color: #C9A84C; font-size: 14px;
            font-weight: 600; letter-spacing: 1px;
            background: rgba(10,10,10,0.9); padding: 12px;
        }
    </style>
</head>
<body>

    <!-- CSS-only checkbox hack — no JavaScript! -->
    <input type="checkbox" id="hamburger-toggle">

    <!-- NAVBAR -->
    <nav>
        <label for="hamburger-toggle" class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <h1 class="gold-gradient-text" style="font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; letter-spacing: 3px;">ÉLÉGANT</h1>

        <button class="nav-btn">Book Now</button>
    </nav>

    <!-- DROPDOWN MENU (slides down when hamburger is checked) -->
    <div class="mobile-menu">
        <a href="#" class="active">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Packages</a>
        <a href="#">Pastries</a>
        <a href="#">Accessories</a>
        <a href="#">Contact</a>
    </div>

    <!-- Dark overlay behind menu -->
    <div class="menu-overlay"></div>

    <!-- Mockup hint -->
    <div class="mockup-label">👆 Tap the hamburger icon to see the dropdown!</div>

    <!-- Fake content to show overlay effect -->
    <div style="padding-top: 100px; padding: 100px 20px 20px; text-align: center;">
        <h2 style="font-family: 'Playfair Display', serif; font-size: 28px; color: white; margin-bottom: 10px;">Injecting <span class="gold-gradient-text">Butterflies</span></h2>
        <p style="color: #B8B8B8; font-size: 14px;">Tap the ☰ hamburger icon to see the CSS-only dropdown menu</p>
    </div>

</body>
</html>
